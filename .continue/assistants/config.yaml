name: NeoGen Assistant
version: 1.0.0
schema: v1
models:
  - name: Neogen Multimodal
    provider: openai
    model: multimdia
    apiKey: ${{API_KEY}}
    apiBase: https://neogen.neosoft.fr/api/
    env:
      useLegacyCompletionsEndpoint: false
    roles:
      - chat
      - edit

  - name: Neogen Agentique
    provider: openai
    model: swe-dev-minimax-m2-5
    apiKey: ${{API_KEY}}
    apiBase: https://neogen.neosoft.fr/api/
    env:
      useLegacyCompletionsEndpoint: false
    roles:
      - chat
      - edit
	  
  - name: Neogen Standard
    provider: openai
    model: standard
    apiKey: ${{API_KEY}}
    apiBase: https://neogen.neosoft.fr/api/
    env:
      useLegacyCompletionsEndpoint: false
    roles:
      - chat
      - edit
 
  - name: NeoGen Coder XS 
    provider: openai
    model: neogen-coder-xs
    apiKey: ${{API_KEY}}
    apiBase: https://neogen.neosoft.fr/api/
    env:
      useLegacyCompletionsEndpoint: false
    roles:
      - autocomplete

context:
  - provider: code
  - provider: docs
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: codebase
